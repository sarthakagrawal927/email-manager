name: Deploy to Cloudflare Workers
on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/deploy.yml'
      - 'index.html'
      - 'landing-astro/**'
      - 'migrations/**'
      - 'public/**'
      - 'scripts/**'
      - 'src/**'
      - 'biome.json'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'postcss.config.mjs'
      - 'tsconfig*.json'
      - 'vite.config.ts'
      - 'wrangler.toml'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/deploy.yml'
      - 'index.html'
      - 'landing-astro/**'
      - 'migrations/**'
      - 'public/**'
      - 'scripts/**'
      - 'src/**'
      - 'biome.json'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'postcss.config.mjs'
      - 'tsconfig*.json'
      - 'vite.config.ts'
      - 'wrangler.toml'

jobs:
  deploy-production:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with: { node-version: '22', cache: pnpm }
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm build
      - run: pnpm exec wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Smoke check production worker
        run: curl --fail --silent --show-error --location --max-time 30 https://email-manager.sarthakagrawal927.workers.dev >/dev/null

  deploy-preview:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with: { node-version: '22', cache: pnpm }
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm build
      - name: Deploy preview
        run: pnpm exec wrangler deploy --env preview
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `Preview deployed to: https://email-manager.sarthakagrawal927.workers.dev`
            })