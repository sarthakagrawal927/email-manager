name: Foundry Evidence

on:
  push:
    branches: [main, master]
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  evidence:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Generate Foundry evidence
        run: pnpm foundry:evidence

      - name: Upload evidence artifact
        uses: actions/upload-artifact@v4
        with:
          name: foundry-evidence
          path: foundry-evidence.json
          retention-days: 30
