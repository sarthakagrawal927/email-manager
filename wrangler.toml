name = "email-manager"
main = "src/worker.ts"
compatibility_date = "2025-09-23"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]

# SPA routes (/app, /about, /privacy) are served by the Worker from
# dist/spa-index.html. index.html is the Astro landing — using SPA
# fallback here would serve the landing page for /app navigations.
assets = { directory = "dist", binding = "ASSETS", not_found_handling = "none" }

routes = [
  { pattern = "mail.sassmaker.com", custom_domain = true }
]

[placement]
mode = "smart"

[observability]
enabled = true
head_sampling_rate = 0.1

[limits]
cpu_ms = 30000

[[d1_databases]]
binding = "DB"
database_name = "email-manager-auth"
database_id = "e770dfa2-1032-4a12-b0fb-52e77f5319e8"
migrations_dir = "migrations"

[vars]
NODE_ENV = "production"
BETTER_AUTH_URL = "https://mail.sassmaker.com"

[dev]
port = 8787
