name = "email-manager"
main = ".open-next/worker.js"
compatibility_date = "2025-09-23"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]

assets = { directory = ".open-next/assets", binding = "ASSETS" }

# psi-swarm flagged the LCP as 4.6s on mobile-mid with high render delay.
# Smart placement puts the Worker near D1 so auth/session round-trips
# don't dominate first-byte time.
[placement]
mode = "smart"

[observability]
enabled = true
head_sampling_rate = 0.1

[limits]
cpu_ms = 30000

[[d1_databases]]
binding = "DB"
database_name = "email-manager-auth"
database_id = "e770dfa2-1032-4a12-b0fb-52e77f5319e8"
migrations_dir = "migrations"

[vars]
NODE_ENV = "production"
BETTER_AUTH_URL = "https://email-manager.sarthakagrawal927.workers.dev"
